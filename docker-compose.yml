services:
  db:
    image: postgres:16-alpine
    container_name: grifind-invest-db
    environment:
      POSTGRES_USER: grifind
      POSTGRES_PASSWORD: grifind
      POSTGRES_DB: grifind
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grifind -d grifind"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grifind-invest-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://grifind:grifind@db:5432/grifind
      UVICORN_RELOAD: "0"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
